<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta name="description" content="Community information, channels, and collaboration for FreeOS.me.">
	<meta name="author" content="Vicente Garcia Diaz">
	<title>FreeOS.me | Community</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Cantarell:wght@400;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="css/styles.css">
</head>
<body>
	<div class="noise" aria-hidden="true"></div>
	<div class="blob blob-a" aria-hidden="true"></div>
	<div class="blob blob-b" aria-hidden="true"></div>
	<div id="site-header"></div>

	<main class="container about-layout">
		<section class="about-hero" aria-labelledby="community-title">
			<h1 id="community-title" class="title-with-icon"><span class="ui-icon icon-about" aria-hidden="true"></span>Community</h1>
			<p class="section-sub">
				Connect with the FreeOS.me community, follow project updates, and collaborate on ideas,
				reporting, and contributions as the distro evolves in public.
				<a href="/community/" class="btn-link">Join the Chat</a>
				<a href="https://matrix.to/#/@vicente:matrix.org" target="_blank" rel="noopener noreferrer">Escríbeme un mensaje directo en Matrix</a>
				<div class="chat-container" style="margin-top: 2rem; border-radius: 8px; overflow: hidden; border: 1px solid #444;">
				<iframe 
					src="https://freeos.me/community/#/room/#freeos.me:matrix.org" 
					width="100%" 
					height="600px" 
					frameborder="0" 
					allow="microphone; camera; display-capture"
					title="Chat de la Comunidad FreeOS">
				</iframe>
				</div>
			</p>
		</section>
	</main>

	<div id="site-footer"></div>
	<script src="js/layout.js"></script>
</body>
</html>
