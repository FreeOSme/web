<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta name="description" content="FreeOS.me full releases page rendered from Markdown.">
	<meta name="author" content="Vicente García Díaz">
    <title>FreeOS.me | All Releases</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Cantarell:wght@400;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="css/styles.css">
</head>
<body>
	<div class="noise" aria-hidden="true"></div>
	<div class="blob blob-a" aria-hidden="true"></div>
	<div class="blob blob-b" aria-hidden="true"></div>
	<div id="site-header"></div>

	<main class="container releases-layout">
		<section aria-labelledby="page-title" class="releases-hero">
			<h1 id="page-title" class="title-with-icon"><span class="ui-icon icon-release" aria-hidden="true"></span>All Releases</h1>
			<p class="section-sub">
				This page is generated from RELEASES.md and includes every published version,
				with package status, distribution notes, and release-level metadata.
			</p>
			<div class="cta-row">
				<a class="btn btn-primary" href="https://gitlab.com/freeos.me/core/-/raw/main/RELEASES.md?ref_type=heads" target="_blank" rel="noopener noreferrer"><span class="btn-label"><span class="ui-icon icon-markdown" aria-hidden="true"></span>Open Raw Markdown</span></a>
			</div>
		</section>

		<div class="document-layout">
			<aside class="card document-sidebar" aria-labelledby="release-nav-title">
				<h2 id="release-nav-title" class="sidebar-title title-with-icon"><span class="ui-icon icon-nav" aria-hidden="true"></span>Quick Navigation</h2>
				<p class="meta">Go directly to any tracked release milestone.</p>
				<section id="releaseAnchors" class="anchor-links" aria-label="Release anchors">
					<p class="meta">Loading anchors...</p>
				</section>
			</aside>

			<section id="markdown" class="card markdown-wrap document-panel" aria-live="polite">
				<p class="meta">Loading releases...</p>
			</section>
		</div>
	</main>

	<div id="site-footer"></div>

	<script src="js/layout.js"></script>
	<script src="js/site-content.js"></script>
	<script src="js/content-utils.js"></script>
	<script src="js/docs.js"></script>
</body>
</html>
