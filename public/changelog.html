<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta name="description" content="FreeOS.me full changelog page rendered from Markdown.">
    <meta name="author" content="Vicente García Díaz">
	<title>FreeOS.me | Full Changelog</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Cantarell:wght@400;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="styles.css">
</head>
<body>
	<div class="noise" aria-hidden="true"></div>
	<div class="blob blob-a" aria-hidden="true"></div>
	<div class="blob blob-b" aria-hidden="true"></div>
	<div id="site-header"></div>

	<main class="container changelog-layout">
		<section aria-labelledby="page-title" class="changelog-hero">
			<h1 id="page-title" class="title-with-icon"><span class="ui-icon icon-changelog" aria-hidden="true"></span>Full Changelog</h1>
			<p class="section-sub">
				This page renders from CHANGELOG.md and includes quick anchors for current releases.
			</p>
			<div class="cta-row">
				<a class="btn btn-primary" href="https://gitlab.com/freeos.me/core/-/blob/d883072cb0df262dfff0e9357938230773eda03f/CHANGELOG.md" target="_blank" rel="noopener noreferrer"><span class="btn-label"><span class="ui-icon icon-markdown" aria-hidden="true"></span>Open Raw Markdown</span></a>
			</div>
		</section>

		<div class="document-layout">
			<aside class="card document-sidebar" aria-labelledby="changelog-nav-title">
				<h2 id="changelog-nav-title" class="sidebar-title title-with-icon"><span class="ui-icon icon-nav" aria-hidden="true"></span>Quick Navigation</h2>
				<p class="meta">Jump straight to a tracked version change set.</p>
				<section class="anchor-links" aria-label="Release anchors">
					<a class="mini-btn" href="#v0-1-alpha">v0.1 Alpha</a>
				</section>
			</aside>

			<section id="markdown" class="card markdown-wrap document-panel" aria-live="polite">
				<p class="meta">Loading changelog...</p>
			</section>
		</div>
	</main>

	<footer>
		<div class="container">
			<p>FreeOS.me @2026 · Linux distribution in progress</p>
		</div>
	</footer>

	<script src="shared-header.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
	<script src="changelog.js"></script>
</body>
</html>
