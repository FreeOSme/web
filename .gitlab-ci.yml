image: mcr.microsoft.com/powershell:7.4-alpine-3.20

variables:
  CORE_DEFAULT_REF: main
  CORE_DEFAULT_PROJECT_PATH: freeos.me/core

pages:
  stage: deploy
  script:
    - apk add --no-cache hugo git
    - pwsh -File scripts/build-blog.ps1
    - pwsh -File scripts/build-wiki.ps1
    - pwsh -File scripts/generate-site-content.ps1 -Ref "${CORE_REF:-$CORE_DEFAULT_REF}" -ProjectPath "${CORE_PROJECT_PATH:-$CORE_DEFAULT_PROJECT_PATH}"
    - echo "FreeOS deploying static files..."
  artifacts:
    paths:
      - public
  rules:
    - if: '$CI_PIPELINE_SOURCE == "pipeline" || $CI_PIPELINE_SOURCE == "trigger" || $CI_PIPELINE_SOURCE == "parent_pipeline"'
    - if: '$CI_COMMIT_BRANCH == "main"'