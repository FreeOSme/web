<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ if .Title }}{{ .Title }} | {{ end }}{{ .Site.Title }}</title>
  <meta name="description" content="{{ with .Summary }}{{ . | plainify }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cantarell:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="stylesheet" href="{{ "css/blog.css" | relURL }}">
</head>
<body>
  <div id="site-header"></div>

  <main class="container">
    {{ block "main" . }}{{ end }}
  </main>

  <div id="site-footer"></div>
  <script src="/js/layout.js"></script>
  {{ if and .IsPage (findRE "```mermaid" .RawContent 1) }}
  <script type="module">
    import mermaid from "https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs";
    window.__mermaid = mermaid;
  </script>
  <script src="{{ "js/mermaid-init.js" | relURL }}"></script>
  {{ end }}
</body>
</html>
