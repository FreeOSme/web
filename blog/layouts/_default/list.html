{{ define "main" }}
  <h1>{{ .Title }}</h1>
  {{ if .Content }}
    <div style="font-size: 1.05rem; margin-bottom: 2rem; color: var(--ink-soft);">
      {{ .Content }}
    </div>
  {{ end }}

  {{ if .Pages }}
    <ul class="post-list">
      {{ range .Pages.ByDate.Reverse }}
        <li>
          <a href="{{ .RelPermalink }}">{{ .Title }}</a>
          <span>{{ .Date.Format "January 2, 2006" }}</span>
        </li>
      {{ end }}
    </ul>
  {{ else }}
    <p style="color: var(--ink-soft);">No posts found.</p>
  {{ end }}
{{ end }}
